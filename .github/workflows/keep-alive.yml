name: Keep Alive

# 목적:
#  1) 매일 1회 Supabase DB에 가벼운 요청을 보내 무료 프로젝트의
#     '1주일 미사용 시 일시정지'를 방지한다.
#  2) 리포에 타임스탬프 커밋을 남겨, GitHub의 '60일 커밋 없으면
#     예약 워크플로 자동 비활성화' 정책도 함께 회피한다.

on:
  schedule:
    - cron: '23 15 * * *'      # 매일 15:23 UTC (한국시간 00:23). 정시는 지연이 잦아 피함.
  workflow_dispatch:            # Actions 탭에서 수동 실행(테스트)용

permissions:
  contents: write               # 타임스탬프 커밋/푸시 권한

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase (keep DB awake)
        run: |
          # anon(publishable) 키는 클라이언트에 이미 공개되는 키이므로 노출돼도 안전하다.
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ydladdffjqpcjynqpjdd.supabase.co/rest/v1/vehicles?select=token&limit=1" \
            -H "apikey: sb_publishable_hqsnudfSFzN78mCy3s92Qw_ZXBMl782")
          echo "Supabase responded: HTTP $code"
          # 요청이 DB에 도달하기만 하면 활동으로 집계된다(권한 결과와 무관).
          # 서버 장애(5xx)만 실패로 간주한다.
          if [ "$code" -ge 500 ]; then
            echo "Supabase server error"; exit 1
          fi

      - name: Record timestamp (keep repo active)
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ  last keep-alive ping" > .keepalive
          git config user.name  "keepalive-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: keep-alive $(date -u +%F)" || echo "no change to commit"
          git push
