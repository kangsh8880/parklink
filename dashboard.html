<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKLINK · 관리 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <div><span class="brand">PARKLINK</span> <span class="sub">관리 대시보드</span></div>
  <a class="home" href="index.html">← 허브</a>
</div>

<div class="wrap">
  <h1>연락 이력 · 충격 로그</h1>
  <p class="lead">발신 요청, 차주 응답, 주차 중 충격 이벤트를 한눈에 확인합니다.</p>

  <div class="stats">
    <div class="stat"><b id="kReq">0</b><span>총 요청</span></div>
    <div class="stat"><b id="kAns">0</b><span>응답 완료</span></div>
    <div class="stat"><b id="kPend">0</b><span>대기 중</span></div>
    <div class="stat"><b id="kShock">0</b><span>충격 감지</span></div>
  </div>

  <div class="row mb8">
    <h2 style="margin:0">충격 로그</h2>
    <div class="spacer"></div>
    <button class="btn btn-danger btn-sm" id="shockBtn">⚠️ 충격 시뮬레이트</button>
  </div>
  <div class="card flat" style="padding:0;overflow:hidden">
    <table id="shockTable"><thead><tr><th>시각</th><th>강도</th><th>경과</th></tr></thead><tbody></tbody></table>
    <div id="shockEmpty" class="center muted" style="padding:16px;display:none">충격 기록이 없습니다.</div>
  </div>

  <h2 class="mt16">연락 이력</h2>
  <div class="card flat" style="padding:0;overflow:hidden">
    <table id="reqTable"><thead><tr><th>시각</th><th>사유</th><th>긴급도</th><th>위치</th><th>응답</th></tr></thead><tbody></tbody></table>
    <div id="reqEmpty" class="center muted" style="padding:16px;display:none">연락 이력이 없습니다.</div>
  </div>

  <div class="row mt16">
    <span class="muted">데모 데이터를 비우려면</span>
    <button class="btn btn-ghost" id="resetBtn">전체 초기화</button>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
