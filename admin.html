<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKLINK · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#365C89">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PARKLINK">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
.gate-overlay{position:fixed;inset:0;background:#eef4fb;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.gate-box{width:100%;max-width:340px}
.gate-box .err{margin-top:8px}
</style>
</head>
<body>
<div id="adminGate" class="gate-overlay">
  <div class="gate-box card">
    <div class="brand" style="font-size:20px;margin-bottom:6px">PARKLINK 관리자</div>
    <div id="gatePin">
      <p class="muted mb8">관리자 PIN을 입력하세요.</p>
      <div class="field"><input id="pinInput" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off"></div>
      <button class="btn btn-primary" id="pinBtn" style="width:100%">다음</button>
      <p class="muted err" id="pinErr" style="display:none;color:var(--red)"></p>
    </div>
    <div id="gateLogin" style="display:none">
      <p class="muted mb8">관리자 계정으로 로그인하세요.</p>
      <div class="field"><label>이메일</label><input id="loginEmail" type="email" autocomplete="username"></div>
      <div class="field"><label>비밀번호</label><input id="loginPw" type="password" autocomplete="current-password"></div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%">로그인</button>
      <p class="muted err" id="loginErr" style="display:none;color:var(--red)"></p>
    </div>
  </div>
</div>
<div class="topbar">
  <div><span class="brand">PARKLINK</span> <span class="sub">관리자</span></div>
  <a class="home" href="index.html">← 메인화면</a>
</div>

<div class="wrap">
  <h1>가입자 관리</h1>

  <!-- 탭 네비게이션 -->
  <div class="tabnav" id="tabnav">
    <button class="tabbtn active" data-tab="dashboard">가입자현황</button>
    <button class="tabbtn" data-tab="subs">구독신청관리</button>
    <button class="tabbtn" data-tab="list">가입자목록</button>
    <button class="tabbtn" data-tab="errors">에러로그</button>
  </div>

  <!-- 1) 가입자현황 -->
  <section class="tabpanel" id="tab-dashboard">
    <p class="lead">상태별 가입 현황입니다. 숫자를 누르면 해당 목록으로 이동합니다.</p>
    <div class="stats">
      <button class="stat" data-stat="all"><b id="kTotal">0</b><span>총 가입</span></button>
      <button class="stat" data-stat="active"><b id="kActive">0</b><span>구독중</span></button>
      <button class="stat" data-stat="renew"><b id="kRenew">0</b><span>만료 임박</span></button>
      <button class="stat" data-stat="expired"><b id="kExpired">0</b><span>만료</span></button>
    </div>
    <div id="renewCard" class="card mt16" style="display:none">
      <h2>🔔 갱신 알림 대상 (만료 2주 전~만료)</h2>
      <div id="renewList"></div>
    </div>
  </section>

  <!-- 2) 구독신청관리 -->
  <section class="tabpanel" id="tab-subs" style="display:none">
    <!-- 조회(검색) 영역 -->
    <div class="card searchbar">
      <div class="srow">
        <select id="subStatus">
          <option value="all">ALL (전체)</option>
          <option value="pending">승인대기</option>
          <option value="active">승인</option>
          <option value="rejected">반려</option>
        </select>
        <textarea id="subKeyword" rows="1" placeholder="차량명 · 번호판 · 전화번호 검색"></textarea>
        <button class="btn btn-primary btn-sm" id="subSearch">조회</button>
      </div>
      <div class="muted mt8" id="subListCount"></div>
    </div>

    <div class="card" id="subsCard">
      <div class="row"><h2 style="margin:0">📋 구독 신청 관리</h2><span class="spacer"></span>
        <span class="muted" id="subsCount"></span>
        <button class="btn btn-ghost btn-sm" id="subsRefresh">새로고침</button></div>
      <div id="subsList" class="mt8 muted">불러오는 중…</div>
    </div>
  </section>

  <!-- 3) 가입자목록 -->
  <section class="tabpanel" id="tab-list" style="display:none">
    <div class="row" style="align-items:center">
      <h2 style="margin:0">가입자 목록</h2><span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" id="backToDash">← 현황으로</button>
    </div>

    <!-- 조회(검색) 영역 -->
    <div class="card searchbar">
      <div class="srow">
        <select id="fStatus">
          <option value="all">ALL (전체)</option>
          <option value="active">구독중</option>
          <option value="renew">만료 임박</option>
          <option value="expired">만료</option>
        </select>
        <textarea id="fKeyword" rows="1" placeholder="차량명 · 번호판 · 전화번호 검색"></textarea>
        <button class="btn btn-primary btn-sm" id="fSearch">조회</button>
      </div>
      <div class="muted mt8" id="listCount"></div>
    </div>

    <div class="card flat" style="padding:0;overflow-x:auto">
      <table class="admin" id="vtable">
        <thead><tr>
          <th>차량</th><th>차주번호</th><th>토큰</th><th>시작</th><th>만료</th>
          <th>남은일</th><th>상태</th><th class="right">관리</th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <div id="empty" class="notfound" style="display:none">
        <div class="big">🗂️</div>조회된 가입자가 없습니다.
      </div>
    </div>

    <div class="note mt16"><span>🧪</span><span>테스트: 각 행의 <b>만료-10일</b>/<b>만료처리</b> 버튼으로 갱신 알림·만료 동작을 즉시 확인할 수 있습니다.</span></div>

    <div class="row mt8">
      <a class="btn btn-outline btn-sm" href="subscribe.html">+ 차량 등록</a>
      <span class="spacer"></span>
      <button class="btn btn-ghost" id="resetBtn">전체 초기화</button>
    </div>

    <!-- QR 모달 대용 영역 -->
    <div id="qrPanel" class="card mt16" style="display:none">
      <div class="row"><h2 style="margin:0" id="qrTitle">QR</h2><span class="spacer"></span>
        <button class="btn btn-ghost" id="qrClose">닫기</button></div>
      <div class="qrwrap" id="qrBox"></div>
      <div class="copybox"><span class="grow" id="qrUrl"></span></div>
    </div>
  </section>

  <!-- 4) 에러로그 -->
  <section class="tabpanel" id="tab-errors" style="display:none">
    <div class="card">
      <div class="row"><h2 style="margin:0">⚠️ 에러 로그</h2><span class="spacer"></span>
        <button class="btn btn-ghost btn-sm" id="errRefresh">새로고침</button>
        <button class="btn btn-ghost btn-sm" id="errClear">전체 삭제</button></div>
      <div id="errList" class="muted mt8">불러오는 중…</div>
    </div>
  </section>
</div>

<script src="js/qrcode.min.js"></script>
<script src="js/common.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
