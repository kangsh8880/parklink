<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKLINK · 차주</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#365C89">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PARKLINK">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<div id="flashOverlay"></div>
<div class="topbar">
  <div><span class="brand">PARKLINK</span> <span class="sub">차주</span></div>
  <a class="home" href="index.html">← 허브</a>
</div>

<div class="wrap-narrow">
  <div id="invalid" class="notfound" style="display:none">
    <div class="big">⚠️</div>
    <p>차량 정보를 찾을 수 없습니다.<br><span class="muted">관리자 또는 구독 신청에서 차량을 선택하세요.</span></p>
    <div class="linkrow" style="justify-content:center"><a href="admin.html">관리자</a><a href="subscribe.html">구독 신청</a></div>
  </div>

  <div id="valid" style="display:none">
    <h1 id="vehTitle">실시간 알림</h1>
    <p class="lead owner-lead">응답을 보내면, 발신자에게 회신됩니다.</p>

    <div id="addHomeBanner" class="addhome-banner" style="display:none">
      <div class="ahb-head"><span>📱 이 화면을 홈 화면에 추가하세요</span>
        <button class="ahb-x" id="ahbClose" aria-label="닫기">✕</button></div>
      <p class="ahb-desc">추가하면 앱처럼 바로 열 수 있어요.</p>
      <div id="ahbSteps"></div>
    </div>

    <!-- 알림 설정: Off [토글] On -->
    <div class="card owner-card" id="notifCard">
      <div class="row">
        <div class="grow"><b>알림 설정</b></div>
        <span class="onoff" id="lblOff">Off</span>
        <label class="switch"><input type="checkbox" id="notifToggle" checked><span class="slider"></span></label>
        <span class="onoff" id="lblOn">On</span>
      </div>
      <div class="muted" id="notifStatus" style="display:none"></div>
    </div>

    <!-- 구독/갱신 배너 -->
    <div id="subBanner"></div>

    <!-- 구독 정보 (재배열) -->
    <div class="card tint owner-card" id="subCard">
      <div class="subhead"><h2>구독 정보</h2><span class="subhead-token"><span class="sk">토큰</span> <span class="tokenpill" id="subToken"></span></span></div>
      <div id="subInfo"></div>
      <div class="row mt8">
        <input id="phoneInput" class="grow" type="tel" inputmode="tel" placeholder="010-0000-0000">
        <button class="btn btn-sm btn-primary" id="savePhone">번호 저장</button>
      </div>
      <p class="muted sm mt8">발신자의 통화·문자가 이 번호로 연결됩니다.</p>
    </div>

    <div id="shockBox"></div>

    <!-- 현재 요청 현황 (회신 대기 중인 pending만) -->
    <h2 class="sec">현재 요청 현황</h2>
    <div id="reqList"></div>
    <div id="empty" class="card flat center muted sm" style="display:none">지금 회신할 요청이 없습니다.</div>

    <!-- 요청이력 조회 (초기 접힘, 클릭 시 펼침) -->
    <button class="btn btn-outline full mt8" id="historyToggle">요청이력 조회 <span id="histArrow">▾</span></button>
    <div id="historyWrap" style="display:none">
      <div id="historyList" class="mt8"></div>
      <div id="historyEmpty" class="card flat center muted sm" style="display:none">과거 요청 이력이 없습니다.</div>
    </div>
  </div>
</div>

<script src="js/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/push.js"></script>
<script src="js/voice.js"></script>
<script src="js/assistant.js"></script>
<script src="js/owner.js"></script>
<footer class="site-footer">
  <a href="privacy.html">개인정보처리방침</a> · <a href="terms.html">이용약관</a><br>
  PARKLINK — 번호는 숨기고, 소통은 양방향으로
</footer>
</body>
</html>
