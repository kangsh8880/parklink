<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKLINK · 구독 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#365C89">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PARKLINK">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<div class="topbar">
  <div><span class="brand">PARKLINK</span> <span class="sub">구독 신청</span></div>
  <a class="home" href="index.html">← 허브</a>
</div>

<div class="wrap-narrow">
  <h1>구독 신청 / 차량 등록</h1>
  <p class="lead">차주 전화번호로 구독합니다. 등록하면 차량 고유 QR이 발급됩니다.</p>

  <!-- 신청 폼 -->
  <div id="form" class="card">
    <div class="field">
      <label>차량명 / 번호판</label>
      <input id="vName" type="text" placeholder="예: 카니발 12가3456">
    </div>
    <div class="field">
      <label>차주 전화번호</label>
      <input id="vPhone" type="tel" inputmode="tel" placeholder="010-4411-3606" value="010-4411-3606">
      <div class="hint">발신자의 통화·문자가 이 번호로 안심 연결됩니다.</div>
    </div>
    <div class="field">
      <label>구독 기간 (개월)</label>
      <input id="vMonths" type="number" min="1" max="36" step="1" value="3">
      <div class="hint">원하는 개월 수를 입력하세요. 만료 2주 전부터 갱신 알림이 표시됩니다.</div>
    </div>
    <button class="btn btn-primary" id="submitBtn">구독 신청하고 QR 발급</button>
  </div>

  <!-- 발급 결과 -->
  <div id="result" style="display:none">
    <div class="card mint">
      <h2>✓ 구독이 시작되었습니다</h2>
      <dl class="kv" id="resultInfo"></dl>
    </div>

    <div class="card center">
      <h2>차량 전용 QR (E-ink 패널용)</h2>
      <div class="qrwrap" id="qrBox"></div>
      <p class="muted">스캔하면 이 차량 차주에게 안심 연결됩니다.</p>
      <div class="linkrow" style="justify-content:center">
        <a id="dlBtn" download>QR 이미지 저장</a>
      </div>
    </div>

    <div class="card">
      <h2>테스트 링크</h2>
      <p class="muted mb8">아래 화면을 각각 다른 탭에서 열어 흐름을 확인하세요.</p>
      <div class="linkrow">
        <a id="lnkPanel" target="_blank">🖥️ 차량 패널</a>
        <a id="lnkOwner">🔔 차주 화면</a>
        <a id="lnkSender" target="_blank">📷 발신자(스캔) 화면</a>
      </div>
    </div>

    <div class="row mt8">
      <button class="btn btn-outline btn-sm" id="againBtn">차량 추가 등록</button>
      <a class="btn btn-ghost" href="admin.html">관리자 페이지 →</a>
    </div>
  </div>
</div>

<script src="js/qrcode.min.js"></script>
<script src="js/common.js"></script>
<script src="js/subscribe.js"></script>
</body>
</html>
