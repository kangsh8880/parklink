<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKLINK · 차량 패널</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#365C89">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PARKLINK">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<div class="panel-screen">
  <div class="eink">
    <div class="topline"><span id="topLabel">주차 중 · 스캔하여 연락</span><span class="row" style="gap:6px"><span class="live"></span>E-INK</span></div>

    <!-- 차량 미지정 -->
    <div id="nodata" class="standby" style="display:none">
      차량이 지정되지 않았습니다.<br>관리자에서 차량 QR을 발급하세요.
    </div>

    <!-- 만료 -->
    <div id="expired" style="display:none">
      <div class="resp" style="border-color:var(--red)">
        <div class="lbl">구독 상태</div>
        <div class="msg" style="color:var(--red);font-size:24px">구독 만료</div>
        <div class="why">갱신 후 이용 가능합니다</div>
      </div>
    </div>

    <!-- 대기(QR) -->
    <div id="standby" style="display:none">
      <div class="qrwrap" id="qrBox"></div>
      <div class="standby">전화번호 비공개 · QR/NFC로 연결됩니다</div>
    </div>

    <!-- 응답 -->
    <div id="response" class="resp" style="display:none">
      <div class="lbl">차주 응답</div>
      <div class="msg" id="respMsg"></div>
      <div class="why" id="respWhy"></div>
    </div>

    <div class="footer">PARKLINK · 무접착 거치 · 2.9" E-ink · QR/NFC · G센서 · 태양광</div>
  </div>
</div>

<script src="js/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/i18n.js"></script>
<script src="js/common.js"></script>
<script src="js/panel.js"></script>
</body>
</html>
