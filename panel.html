<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARKLINK · 차량 패널</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="panel-screen">
  <div class="eink">
    <div class="topline"><span>주차 중 · 스캔하여 연락</span><span class="row" style="gap:6px"><span class="live"></span>E-INK</span></div>

    <!-- 대기 상태: QR -->
    <div id="standby">
      <img class="qr" id="qrImg" src="images/parklink_qr.svg" alt="PARKLINK 연락 QR">
      <div class="standby">전화번호 비공개 · QR/NFC로 연결됩니다</div>
    </div>

    <!-- 응답 표시 -->
    <div id="response" class="resp" style="display:none">
      <div class="lbl">차주 응답</div>
      <div class="msg" id="respMsg"></div>
      <div class="why" id="respWhy"></div>
    </div>

    <div class="footer">PARKLINK · 무접착 거치 · 2.9" E-ink · QR/NFC · G센서 · 태양광</div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/panel.js"></script>
</body>
</html>
